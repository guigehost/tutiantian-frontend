version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./storage:/usr/share/nginx/html/storage:ro
    depends_on:
      - backend
    networks:
      - frontend

  backend:
    image: word-template-filler-api:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    networks:
      - frontend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - frontend

networks:
  frontend:
    driver: bridge

volumes:
  redis_data: